app = "discord-translator"

primary_region = "gru"

[build]

[env]
PORT = "8080"
NODE_ENV = "production"

[http_service]
internal_port = 8080
force_https = true

auto_stop_machines = false
auto_start_machines = true

min_machines_running = 1

processes = ["app"]

[[http_service.checks]]
interval = "30s"
timeout = "5s"
grace_period = "15s"
method = "GET"
path = "/"

[processes]
app = "node --expose-gc index.js"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "512mb"
